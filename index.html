<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Jurnal Penghubung Kita 📒</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Fredoka', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
        }

        body {
            background: #fdfaf6;
            color: #334155;
            overflow-x: hidden;
        }

        .kids-btn {
            border-radius: 20px;
            font-weight: 700;
            transition: .2s;
        }

        .kids-btn:active {
            transform: scale(.96);
        }

        .btn-primary {
            background: #ff9f43;
            color: white;
        }

        .btn-secondary {
            background: #4ecdc4;
            color: white;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 6px 24px rgba(0,0,0,.04);
        }

        .journal-slider {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            scroll-snap-type: x mandatory;
            padding-bottom: 1rem;
        }

        .journal-slider::-webkit-scrollbar {
            display: none;
        }

        .journal-card {
            min-width: 100%;
            scroll-snap-align: start;
        }

        @media(min-width:768px){
            .journal-card {
                min-width: calc(50% - .5rem);
            }
        }

        .modal {
            background: rgba(0,0,0,.50);
            backdrop-filter: blur(8px);
        }

        .notification-badge {
            position: relative;
        }

        .badge-number {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .pin-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }
        .pin-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: all 0.2s;
        }
        .pin-dot.active {
            background: #ff9f43;
            width: 24px;
            border-radius: 6px;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="loading" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-white/90">
        <div class="text-center">
            <div class="animate-spin w-16 h-16 border-4 border-amber-400 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-4 font-bold text-amber-600">Menyelaraskan data...</p>
        </div>
    </div>

    <nav class="sticky top-0 z-40 p-3">
        <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-lg p-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-amber-500 flex items-center gap-2">
                <span>JurnalKita 📒</span>
            </h1>
            <div class="flex gap-2 items-center">
                <button onclick="showView('home')" class="px-4 py-2 rounded-xl hover:bg-amber-50 font-bold text-slate-700">Beranda</button>
                <button id="admin-nav-btn" onclick="openLogin()" class="kids-btn btn-secondary px-5 py-2 relative notification-badge shadow-sm">
                    Guru 👩‍🏫
                    <span id="notif-floating" class="badge-number hidden"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-4">

        <section id="view-home" class="view space-y-8">
            <div class="text-center py-8">
                <h2 class="text-4xl font-black text-slate-800 md:text-5xl">
                    JURNAL PENGHUBUNG KELAS 
                </h2>
                <p class="text-slate-400 mt-2 font-bold text-sm md:text-base">
                    Pilih nama Ananda, masukkan PIN, dan pantau perkembangan harian
                </p>
            </div>
            <div id="student-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </section>

        <section id="view-gallery" class="view hidden space-y-5">
            <button onclick="showView('home')" class="kids-btn bg-white px-5 py-3 rounded-2xl shadow font-bold text-slate-700 border border-slate-100">
                ← Kembali
            </button>

            <div id="gallery-header" class="card p-6"></div>

            <div class="flex justify-end">
                <button id="download-pdf-btn" onclick="downloadStudentPortfolio()" class="kids-btn bg-emerald-500 text-white px-5 py-3 rounded-2xl shadow font-bold hover:bg-emerald-600">
                    <i class="fas fa-file-pdf mr-2"></i> Unduh Rekap Jurnal PDF
                </button>
            </div>

            <div id="gallery-grid" class="journal-slider"></div>
        </section>

        <section id="view-admin" class="view hidden space-y-5">
            <div class="card p-5 flex justify-between items-center bg-gradient-to-r from-teal-50 to-white border-l-4 border-teal-400">
                <div class="flex items-center gap-3">
                    <h2 class="text-2xl font-black md:text-3xl text-slate-800">Ruang Kerja Guru 🍏</h2>
                    <span id="notif-badge" class="bg-rose-500 text-white px-3 py-1 rounded-full text-xs font-bold hidden"></span>
                </div>
                <button onclick="logout()" class="text-rose-500 font-bold hover:underline">Keluar</button>
            </div>

            <div class="grid lg:grid-cols-3 gap-5">
                <div class="space-y-4">
                    <button onclick="showModal('modal-student')" class="kids-btn btn-primary w-full py-4 text-lg shadow-md">
                        + Tambah Data Siswa Baru
                    </button>
                    <div id="admin-student-list" class="space-y-3"></div>
                </div>

                <div class="lg:col-span-2 card p-6">
                    <h3 class="text-2xl font-black mb-5 text-slate-700 flex items-center gap-2">
                        <span>Catatan & Balasan Orang Tua ✉️</span>
                    </h3>
                    <div id="admin-comment-log" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </section>

    </main>

    <div id="modal-password" class="hidden fixed inset-0 modal z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-7 w-full max-w-sm shadow-2xl">
            <div id="pin-student-info" class="text-center mb-4">
                <img id="pin-student-avatar" class="w-20 h-20 rounded-full mx-auto object-cover mb-2 ring-4 ring-amber-100">
                <h3 id="pin-student-name" class="text-xl font-black text-slate-800"></h3>
            </div>
            <h3 class="text-xl font-black text-center text-slate-600 mb-2">Verifikasi Keamanan</h3>
            <p class="text-xs text-center text-slate-400 font-medium mb-4">Masukkan 6-digit PIN Wali Murid</p>
            <div class="space-y-4">
                <div class="flex justify-center gap-3">
                    <input type="password" id="pin-input" maxlength="6" class="w-full p-4 text-center text-2xl rounded-2xl bg-slate-50 border border-slate-200 outline-none tracking-widest text-slate-700 focus:border-amber-400" placeholder="••••••">
                </div>
                <div class="pin-dots" id="pin-dots">
                    <span class="pin-dot"></span><span class="pin-dot"></span>
                    <span class="pin-dot"></span><span class="pin-dot"></span>
                    <span class="pin-dot"></span><span class="pin-dot"></span>
                </div>
                <button onclick="verifyPassword()" class="kids-btn btn-primary w-full py-4 text-lg shadow">
                    Buka Jurnal 📒
                </button>
                <button onclick="hideModal('modal-password')" class="w-full text-slate-400 font-bold text-sm hover:text-slate-600">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <div id="modal-login" class="hidden fixed inset-0 modal z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-7 w-full max-w-sm shadow-2xl">
            <h3 class="text-2xl font-black text-center mb-6 text-slate-800">Autentikasi Guru 👩‍🏫</h3>
            <div class="space-y-3">
                <input id="login-user" type="text" placeholder="Username" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-slate-700">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-slate-700">
                <button onclick="handleLogin()" class="kids-btn btn-secondary w-full py-4 text-lg shadow">Masuk Ke Ruang Guru</button>
                <button onclick="hideModal('modal-login')" class="w-full text-slate-400 font-bold text-sm">Tutup</button>
            </div>
        </div>
    </div>

    <div id="modal-upload" class="hidden fixed inset-0 modal z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <h3 id="upload-modal-title" class="text-2xl font-black text-slate-800">Isi Catatan Jurnal</h3>
                <button onclick="hideModal('modal-upload')" class="text-2xl text-slate-400 hover:text-slate-600">✖</button>
            </div>
            <div class="space-y-4 bg-amber-50/60 p-5 rounded-3xl border border-amber-100">
                <input id="up-judul" type="text" placeholder="Topik/Judul Kegiatan Hari Ini (misal: Kegiatan Mewarnai, Evaluasi Gizi)" class="w-full p-4 rounded-2xl border-none outline-none text-slate-700 shadow-sm" shadow-sm>
                <textarea id="up-deskripsi" rows="3" placeholder="Tulis catatan perkembangan, sikap, atau pesan penting untuk orang tua disini..." class="w-full p-4 rounded-2xl border-none outline-none text-slate-700 shadow-sm font-medium text-sm"></textarea>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 px-1">Unggah Dokumentasi Foto Kegiatan (Opsional)</label>
                    <input id="up-file" type="file" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200">
                </div>
                <img id="preview-upload" class="hidden w-full max-h-[200px] object-cover rounded-2xl shadow-md mt-2">
                <button onclick="processUpload()" class="kids-btn btn-primary w-full py-4 text-lg shadow">Kirim ke Jurnal Anak 🚀</button>
            </div>
            <div id="admin-work-list" class="space-y-3 mt-5"></div>
        </div>
    </div>

    <div id="modal-student" class="hidden fixed inset-0 modal z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-2xl font-black mb-4 text-slate-800">Tambah Profil Siswa 👶</h3>
            <div class="space-y-3">
                <input id="st-nama" type="text" placeholder="Nama Lengkap Anak" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-slate-700">
                <input id="st-pass" type="text" placeholder="Buat PIN Akses Wali Murid (6 Angka)" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-slate-700" maxlength="6">
                <input id="st-foto" type="text" placeholder="URL Foto Profil Anak (Kosongkan jika tidak ada)" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-slate-700">
                <button onclick="saveStudent()" class="kids-btn btn-primary w-full py-4 text-lg shadow mt-2">Simpan Profil</button>
                <button onclick="hideModal('modal-student')" class="w-full text-slate-400 font-bold text-sm">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // Ganti URL ini dengan URL Apps Script Web App Anda jika ingin disambungkan ke Google Sheets asli
        const API_URL = 'https://script.google.com/macros/s/AKfycbyLHYTqEnSFYa-tUctdBGBxTGkbTCZ4ngP6G6te7Nv7LMS2Cc8SVz2Q2zjr1WE0IxUh/exec';

        let isAdminLoggedIn = false;
        let currentStudentId = null;
        let pendingStudentId = null;

        function toggleLoading(v){
            document.getElementById('loading').classList.toggle('hidden', !v);
        }

        function showModal(id){
            document.getElementById(id).classList.remove('hidden');
        }

        function hideModal(id){
            document.getElementById(id).classList.add('hidden');
        }

        function showView(id){
            document.querySelectorAll('.view').forEach(v=>{ v.classList.add('hidden'); });
            document.getElementById('view-'+id).classList.remove('hidden');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        // Fungsi fetch data simulasi (bisa diganti fetch nyata menggunakan API_URL)
        async function fetchData(){
            toggleLoading(true);
            setTimeout(() => {
                renderHome();
                if(isAdminLoggedIn) renderAdmin();
                toggleLoading(false);
            }, 500);
        }

        function renderHome(){
            const grid = document.getElementById('student-grid');
            if(!appData.students.length){
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 font-bold">Belum ada data siswa terdaftar</div>`;
                return;
            }
            grid.innerHTML = appData.students.map(s=>`
                <div onclick="requestPassword('${s.id}')" class="card p-4 text-center cursor-pointer hover:shadow-md border border-slate-100 transition">
                    <img loading="lazy" decoding="async" src="${s.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(s.nama)+'&background=ffeaa7&color=d63031'}" class="w-full aspect-square rounded-2xl object-cover mb-3 ring-2 ring-amber-50">
                    <h3 class="font-black text-slate-700 truncate">${s.nama}</h3>
                    <p class="text-xs text-amber-600 mt-1 font-bold bg-amber-50 rounded-full py-1 px-2 inline-block">${s.karya?.length || 0} Update Jurnal</p>
                </div>
            `).join('');
        }

        // ==================== PROTEKSI KAMPUS PIN WALIMURID ====================
        function requestPassword(studentId){
            const student = appData.students.find(x=>x.id===studentId);
            if(!student) return;
            pendingStudentId = studentId;

            document.getElementById('pin-student-name').innerText = student.nama;
            document.getElementById('pin-student-avatar').src = student.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(student.nama)+'&background=ffeaa7&color=d63031';
            document.getElementById('pin-input').value = '';
            updatePinDots('');
            showModal('modal-password');

            setTimeout(()=>{ document.getElementById('pin-input').focus(); }, 100);
        }

        function updatePinDots(value){
            const dots = document.querySelectorAll('.pin-dot');
            const length = value.length;
            dots.forEach((dot, idx)=>{
                if(idx < length){ dot.classList.add('active'); } 
                else { dot.classList.remove('active'); }
            });
        }

        document.getElementById('pin-input')?.addEventListener('input', function(e){
            updatePinDots(e.target.value);
        });

        document.getElementById('pin-input')?.addEventListener('keypress', function(e){
            if(e.key === 'Enter'){ verifyPassword(); }
        });

        function verifyPassword(){
            const inputPin = document.getElementById('pin-input').value.trim();
            if(!inputPin) return alert('Masukkan PIN terlebih dahulu');

            const student = appData.students.find(x=>x.id===pendingStudentId);
            if(!student){
                alert('Siswa tidak ditemukan');
                hideModal('modal-password');
                return;
            }

            if(inputPin === student.pass){
                hideModal('modal-password');
                renderGallery(pendingStudentId);
            } else {
                alert('PIN salah! Silakan periksa kembali atau tanyakan ke Guru.');
                document.getElementById('pin-input').value = '';
                updatePinDots('');
                document.getElementById('pin-input').focus();
            }
        }

        // ==================== RENDERING TIMELINE JURNAL ====================
        function renderGallery(id){
            currentStudentId = id;
            const s = appData.students.find(x=>x.id===id);
            if(!s) return;

            document.getElementById('gallery-header').innerHTML = `
                <div class="flex flex-col sm:flex-row items-center gap-5">
                    <img src="${s.foto || 'https://ui-avatars.com/api/?name='+s.nama}" class="w-24 h-24 sm:w-28 sm:h-28 rounded-3xl object-cover shadow-md ring-4 ring-amber-100">
                    <div class="text-center sm:text-left">
                        <h2 class="text-3xl font-black text-amber-500">${s.nama}</h2>
                        <p class="text-slate-400 font-bold mt-1">Grup Jurnal Penghubung • ${s.karya.length} Laporan Harian</p>
                    </div>
                </div>
            `;

            const grid = document.getElementById('gallery-grid');
            if(!s.karya.length){
                grid.innerHTML = `<div class="w-full bg-white card p-10 text-center text-slate-400 font-bold">Belum ada catatan jurnal dari wali kelas saat ini.</div>`;
                showView('gallery');
                return;
            }

            grid.innerHTML = s.karya.map(k=>`
                <div class="journal-card card overflow-hidden border border-slate-100 flex flex-col justify-between">
                    <div>
                        ${k.thumb ? `<img src="${k.thumb}" class="w-full aspect-[16/9] object-cover">` : `<div class="w-full h-12 bg-gradient-to-r from-amber-100 to-orange-100"></div>`}
                        <div class="p-5 space-y-2">
                            <div class="flex justify-between items-start gap-3">
                                <h3 class="text-lg font-black text-slate-700">${k.judul}</h3>
                                <span class="text-xs text-slate-400 font-bold whitespace-nowrap bg-slate-100 px-2 py-1 rounded-md">${new Date(k.date).toLocaleDateString('id-ID')}</span>
                            </div>
                            <p class="text-slate-600 text-sm leading-relaxed font-medium bg-slate-50/50 p-3 rounded-xl border border-slate-100">${k.deskripsi || '-'}</p>
                        </div>
                    </div>
                    
                    <div class="p-5 pt-0 border-t border-slate-50 mt-2">
                        <div class="space-y-2 max-h-[180px] overflow-y-auto pr-1 mt-2">
                            ${(s.percakapan || []).filter(p=>p.workId===k.id).map(c=>`
                                <div class="bg-amber-50/50 p-3 rounded-2xl border border-amber-100">
                                    <p class="text-[11px] font-black text-orange-600 mb-1">Tanggapan Orang Tua:</p>
                                    <p class="text-xs font-semibold text-slate-700">${c.pesanWali}</p>
                                    ${c.balasanGuru ? `
                                        <div class="bg-teal-50 border border-teal-100 rounded-xl p-2 mt-2">
                                            <p class="text-[10px] font-black text-teal-600 mb-0.5">Balasan Guru:</p>
                                            <p class="text-xs font-medium text-slate-600">${c.balasanGuru}</p>
                                        </div>
                                    `:''}
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex gap-2 mt-3">
                            <input id="input-chat-${k.id}" type="text" placeholder="Beri tanggapan/konfirmasi orang tua..." class="flex-1 p-3 rounded-xl border border-slate-200 outline-none text-xs font-medium focus:border-amber-400">
                            <button onclick="sendComment('${k.id}')" class="kids-btn btn-primary px-4 text-xs">Kirim</button>
                        </div>
                    </div>
                </div>
            `).join('');
            showView('gallery');
        }

        // ==================== EXPORT PDF JURNAL DIGITAL ====================
        async function downloadStudentPortfolio(){
            if(!currentStudentId) return;
            toggleLoading(true);
            const s = appData.students.find(x=>x.id===currentStudentId);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

            // COVER JURNAL
            doc.setFillColor(255,159,67);
            doc.rect(0,0,210,297,'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(26);
            doc.text('REKAP JURNAL PENGHUBUNG', 105, 120, { align: 'center' });
            doc.setFontSize(20);
            doc.text(s.nama.toUpperCase(), 105, 140, { align: 'center' });
            doc.setFontSize(12);
            doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 105, 260, { align: 'center' });

            // HALAMAN ISI
            for(let i=0; i<s.karya.length; i++){
                doc.addPage();
                const k = s.karya[i];
                doc.setFillColor(252,245,237);
                doc.rect(0,0,210,25,'F');
                doc.setTextColor(40);
                doc.setFontSize(14);
                doc.text(`Topik: ${k.judul}`, 15, 16);
                doc.setFontSize(10);
                doc.text(`Tanggal Kegiatan: ${new Date(k.date).toLocaleDateString('id-ID')}`, 15, 35);
                
                doc.setFontSize(11);
                doc.text('Catatan Harian Guru:', 15, 45);
                const splitDesc = doc.splitTextToSize(k.deskripsi || 'Tidak ada deskripsi tambahan.', 180);
                doc.text(splitDesc, 15, 52);

                let currentY = 80;
                const chats = (s.percakapan || []).filter(p=>p.workId===k.id);
                if(chats.length){
                    doc.text('Log Komunikasi:', 15, currentY);
                    currentY += 5;
                    chats.forEach(c=>{
                        doc.setFillColor(245,245,245);
                        doc.rect(15, currentY, 180, 20, 'F');
                        doc.setFontSize(9);
                        doc.text(`Wali Murid: ${c.pesanWali}`, 18, currentY + 7, {maxWidth: 170});
                        if(c.balasanGuru){
                            doc.text(`Balasan Guru: ${c.balasanGuru}`, 18, currentY + 15, {maxWidth: 170});
                        }
                        currentY += 25;
                    });
                }
            }
            doc.save(`Jurnal-Penghubung-${s.nama}.pdf`);
            toggleLoading(false);
        }

        // ==================== AUTH GURU & PANEL CONTROL ====================
        function openLogin(){
            if(isAdminLoggedIn){ showView('admin'); return; }
            showModal('modal-login');
        }

        function handleLogin(){
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if(u==='admin' && p==='guru123'){ // Credential bawaan
                isAdminLoggedIn = true;
                hideModal('modal-login');
                document.getElementById('admin-nav-btn').innerHTML = 'Dashboard Guru 🏠 <span id="notif-floating" class="badge-number hidden"></span>';
                renderAdmin();
                showView('admin');
            } else {
                alert('Kombinasi User & Password Guru Salah!');
            }
        }

        function logout(){
            isAdminLoggedIn = false;
            document.getElementById('admin-nav-btn').innerHTML = 'Guru 👩‍🏫 <span id="notif-floating" class="badge-number hidden"></span>';
            showView('home');
        }

        function renderAdmin(){
            const list = document.getElementById('admin-student-list');
            list.innerHTML = appData.students.map(s=>`
                <div class="card p-4 border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center gap-2">
                        <div class="flex items-center gap-3">
                            <img src="${s.foto || 'https://ui-avatars.com/api/?name='+s.nama}" class="w-12 h-12 rounded-xl object-cover ring-2 ring-slate-100">
                            <div>
                                <p class="font-black text-slate-700 text-sm">${s.nama}</p>
                                <p class="text-[11px] text-amber-600 font-bold">PIN Orang Tua: ${s.pass}</p>
                                <p class="text-[11px] text-slate-400 font-bold">${s.karya.length} log jurnal</p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="manageKarya('${s.id}')" class="w-8 h-8 rounded-lg bg-amber-50 text-amber-600 hover:bg-amber-100 text-xs" title="Kelola Jurnal">
                                <i class="fas fa-book"></i>
                            </button>
                            <button onclick="deleteStudent('${s.id}')" class="w-8 h-8 rounded-lg bg-rose-50 text-rose-500 hover:bg-rose-100 text-xs" title="Hapus Siswa">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            renderCommentInbox();
        }

        function renderCommentInbox(){
            const wrap = document.getElementById('admin-comment-log');
            if(!wrap) return;

            let allComments = [];
            appData.students.forEach(s=>{
                (s.percakapan || []).forEach(c=>{
                    const karya = s.karya.find(k=>k.id===c.workId);
                    allComments.push({ ...c, student:s, karya });
                });
            });

            allComments.sort((a,b)=> new Date(b.date) - new Date(a.date));
            const unreplyCount = allComments.filter(x=>!x.balasanGuru).length;

            const notifBadge = document.getElementById('notif-badge');
            if(notifBadge){
                if(unreplyCount > 0){
                    notifBadge.classList.remove('hidden');
                    notifBadge.innerText = `${unreplyCount} Masuk`;
                } else { notifBadge.classList.add('hidden'); }
            }

            const floating = document.getElementById('notif-floating');
            if(floating){
                if(unreplyCount > 0){
                    floating.classList.remove('hidden');
                    floating.innerText = unreplyCount;
                } else { floating.classList.add('hidden'); }
            }

            if(!allComments.length){
                wrap.innerHTML = `<div class="bg-slate-50 rounded-3xl p-10 text-center text-slate-400 font-bold text-sm">Belum ada pesan masuk dari orang tua murid.</div>`;
                return;
            }

            wrap.innerHTML = allComments.map(c=>`
                <div class="bg-slate-50/70 rounded-2xl p-4 border border-slate-100">
                    <div class="flex items-center gap-3 mb-2">
                        <img src="${c.student.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(c.student.nama)}" class="w-10 h-10 rounded-xl object-cover">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <h4 class="font-black text-slate-700 text-sm">${c.student.nama}</h4>
                                ${!c.balasanGuru ? `<span class="bg-rose-100 text-rose-600 text-[10px] px-2 py-0.5 rounded-full font-black">Butuh Balasan</span>` : ''}
                            </div>
                            <p class="text-xs text-slate-400 font-bold">Topik Jurnal: ${c.karya?.judul || 'Aktivitas Umum'}</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl p-3 border border-slate-100 text-xs text-slate-600 font-medium">
                        <span class="text-[10px] font-bold text-orange-500 block mb-0.5">Catatan Orang Tua:</span>
                        "${c.pesanWali}"
                    </div>
                    ${c.balasanGuru ? `
                        <div class="bg-teal-50 rounded-xl p-3 mt-2 border border-teal-100 text-xs text-slate-600 font-medium">
                            <span class="text-[10px] font-bold text-teal-600 block mb-0.5">Sudah Dibalas Guru:</span>
                            "${c.balasanGuru}"
                        </div>
                    ` : `
                        <div class="flex gap-2 mt-2">
                            <input id="reply-${c.id}" type="text" placeholder="Tulis respon guru..." class="flex-1 p-2 rounded-xl border border-slate-200 outline-none text-xs font-medium">
                            <button onclick="replyComment('${c.id}')" class="kids-btn btn-secondary px-4 text-xs">Balas</button>
                        </div>
                    `}
                </div>
            `).join('');
        }

        function manageKarya(id){
            currentStudentId = id;
            const s = appData.students.find(x=>x.id===id);
            document.getElementById('upload-modal-title').innerText = `Jurnal Harian ${s.nama}`;
            const list = document.getElementById('admin-work-list');
            list.innerHTML = s.karya.map(k=>`
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-3">
                        ${k.thumb ? `<img src="${k.thumb}" class="w-12 h-12 rounded-xl object-cover">` : `<div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-xs">📒</div>`}
                        <div><p class="font-black text-slate-700 text-xs">${k.judul}</p></div>
                    </div>
                    <button onclick="deleteKarya('${k.id}')" class="text-rose-400 text-lg hover:text-rose-600">🗑️</button>
                </div>
            `).join('');
            showModal('modal-upload');
        }

        // Preview image load harian
        document.getElementById('up-file')?.addEventListener('change', function(e){
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(ev){
                const img = document.getElementById('preview-upload');
                img.src = ev.target.result;
                img.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Simpan input/karya baru siswa oleh guru
        function processUpload(){
            const judul = document.getElementById('up-judul').value.trim();
            const deskripsi = document.getElementById('up-deskripsi').value.trim();
            const previewImg = document.getElementById('preview-upload').src;

            if(!judul || !deskripsi) return alert('Judul kegiatan dan deskripsi harian wajib diisi!');
            
            toggleLoading(true);
            const targetStudent = appData.students.find(x=>x.id===currentStudentId);
            
            const newJournal = {
                id: "J" + Date.now(),
                judul: judul,
                deskripsi: deskripsi,
                date: new Date().toISOString(),
                thumb: document.getElementById('preview-upload').classList.contains('hidden') ? "" : previewImg
            };

            targetStudent.karya.push(newJournal);
            
            // Clean up
            document.getElementById('up-judul').value = '';
            document.getElementById('up-deskripsi').value = '';
            document.getElementById('up-file').value = '';
            document.getElementById('preview-upload').classList.add('hidden');
            
            fetchData();
            hideModal('modal-upload');
        }

        function deleteKarya(workId){
            if(!confirm('Hapus log aktivitas jurnal ini?')) return;
            const s = appData.students.find(x=>x.id===currentStudentId);
            s.karya = s.karya.filter(k=>k.id!==workId);
            s.percakapan = s.percakapan.filter(p=>p.workId!==workId);
            fetchData();
            hideModal('modal-upload');
        }

        function saveStudent(){
            const nama = document.getElementById('st-nama').value.trim();
            const pass = document.getElementById('st-pass').value.trim();
            const foto = document.getElementById('st-foto').value.trim();

            if(!nama || !pass) return alert('Nama Siswa dan PIN Keamanan wajib diisi!');
            
            const newStudent = {
                id: "S" + Date.now(),
                nama: nama,
                pass: pass,
                foto: foto,
                karya: [],
                percakapan: []
            };

            appData.students.push(newStudent);
            hideModal('modal-student');
            
            document.getElementById('st-nama').value = '';
            document.getElementById('st-pass').value = '';
            document.getElementById('st-foto').value = '';
            
            fetchData();
        }

        function deleteStudent(id){
            if(!confirm('Hapus seluruh profil siswa dan riwayat komunikasi terkait?')) return;
            appData.students = appData.students.filter(x=>x.id!==id);
            fetchData();
        }

        // Tanggapan dari Wali Murid (Orang tua)
        function sendComment(workId){
            const input = document.getElementById(`input-chat-${workId}`);
            const text = input.value.trim();
            if(!text) return;

            const student = appData.students.find(x=>x.id===currentStudentId);
            student.percakapan.push({
                id: "C" + Date.now(),
                workId: workId,
                pesanWali: text,
                balasanGuru: "",
                date: new Date().toISOString()
            });

            input.value = '';
            fetchData();
            setTimeout(() => { renderGallery(currentStudentId); }, 200);
        }

        // Respon balik dari Guru ke tanggapan Orang Tua
        function replyComment(commentId){
            const input = document.getElementById(`reply-${commentId}`);
            const text = input.value.trim();
            if(!text) return;

            appData.students.forEach(s=>{
                const targetComm = s.percakapan.find(c=>c.id===commentId);
                if(targetComm){ targetComm.balasanGuru = text; }
            });

            fetchData();
        }

        window.onload = () => { fetchData(); };
    </script>
</body>
</html>
